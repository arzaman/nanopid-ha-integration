###############################################################################
# NanoPID — Bundled Start Package
#
# Incolla questo file in config/packages/ (o includi con homeassistant.packages
# nel tuo configuration.yaml).
#
# Lo script legge i valori correnti delle entità HA e invia un singolo messaggio
# MQTT atomico al device prima di avviare il processo.
#
# IMPORTANTE: sostituisci YOUR_DEVICE_MAC con il MAC del tuo NanoPID
#             (12 caratteri hex, es. 24587c5cd104).
#             Se hai usato un device_name diverso da "NanoPID" nella config,
#             adatta anche i prefissi delle entity_id (es. forno_main_setpoint).
###############################################################################

script:
  nanopid_bundled_start:
    alias: "NanoPID — Bundled Start"
    icon: mdi:play-network
    sequence:
      - service: mqtt.publish
        data:
          topic: "nanopid/24587c5cd104/command"
          qos: 1
          payload: >-
            {"cmd":"start",
             "mode":"{{ states('select.nanopid_target_mode') }}",
             "sp":{{ states('number.nanopid_main_setpoint') | float }},
             "ctrl":"{{ states('select.nanopid_control_mode') }}",
             "dir":"{{ states('select.nanopid_direction') }}",
             "beh":"{{ states('select.nanopid_start_behaviour') }}",
             "prof":"{{ states('select.nanopid_profile_type') }}"}
    mode: single
