###############################################################################
# NanoPID Controller — Lovelace Dashboard Template
# Placeholder {prefix} is replaced at runtime with the HA entity ID prefix
# derived from the configured device name (e.g. "NanoPID" → "nanopid").
###############################################################################

title: "{device_name}"
views:
  - title: "{device_name}"
    icon: mdi:thermostat
    path: "nanopid_{mac}"

    type: custom:layout-card
    layout_type: custom:grid-layout
    layout:
      grid-template-columns: repeat(4, 1fr)
      grid-template-rows: auto
      gap: 12px
      margin: 0

    cards:

      - type: custom:mushroom-title-card
        title: "{device_name}"
        subtitle: Controller di Processo Termico
        title_tap_action:
          action: none
        view_layout:
          grid-column: span 4

      - type: custom:mushroom-chips-card
        chips:
          - type: entity
            entity: "binary_sensor.{prefix}_ac_detected"
            icon: mdi:sine-wave
            content_info: name
            tap_action:
              action: more-info
          - type: template
            content: >
              {{% set s = states('sensor.{prefix}_alarm_status') | lower %}}
              {{% if s in ['over_temp','under_temp','sensor_fail'] %}}
                {{{{ states('sensor.{prefix}_alarm_status') | upper }}}}
              {{% else %}}
                OK
              {{% endif %}}
            icon: >
              {{% set s = states('sensor.{prefix}_alarm_status') | lower %}}
              {{% if s in ['over_temp','under_temp','sensor_fail'] %}}
                mdi:alarm-light
              {{% else %}}
                mdi:shield-check
              {{% endif %}}
            icon_color: >
              {{% set s = states('sensor.{prefix}_alarm_status') | lower %}}
              {{% if s in ['over_temp','under_temp','sensor_fail'] %}}
                red
              {{% else %}}
                green
              {{% endif %}}
            tap_action:
              action: more-info
              entity: "sensor.{prefix}_alarm_status"
          - type: spacer
          - type: entity
            entity: "sensor.{prefix}_free_heap"
            icon: mdi:memory
            content_info: state
        alignment: start
        view_layout:
          grid-column: span 4

      - type: custom:mushroom-template-card
        primary: >
          {{% set s = states('sensor.{prefix}_process_status') | lower %}}
          {{% if 'pid run' in s %}}        PID — Controllo Attivo
          {{% elif 'hys' in s and 'run' in s %}} Isteresi — Controllo Attivo
          {{% elif 'pid pause' in s %}}    PID — In Pausa
          {{% elif 'hys' in s and 'pause' in s %}} Isteresi — In Pausa
          {{% elif 'idle' in s %}}         Sistema in Attesa
          {{% elif 'alarm' in s %}}        ALLARME — Uscite Disabilitate
          {{% elif 'autotune' in s %}}     AutoTune in Corso
          {{% else %}} {{{{ states('sensor.{prefix}_process_status') }}}}
          {{% endif %}}
        secondary: >
          {{% set s    = states('sensor.{prefix}_process_status') | lower %}}
          {{% set sp   = states('number.{prefix}_main_setpoint') %}}
          {{% set pwr  = states('sensor.{prefix}_power_output') %}}
          {{% set ctrl = states('select.{prefix}_control_mode') %}}
          {{% set dir  = states('select.{prefix}_direction') %}}
          {{% set beh  = states('select.{prefix}_start_behaviour') %}}
          {{% set prof = states('select.{prefix}_profile_type') %}}
          {{% if 'run' in s %}}
            SP: {{{{ sp }}}} °C · PWM: {{{{ pwr }}}} % · {{{{ ctrl }}}} · {{{{ dir }}}} · {{{{ beh }}}} · {{{{ prof }}}}
          {{% elif 'pause' in s %}}
            Sospeso · SP: {{{{ sp }}}} °C · {{{{ ctrl }}}} · {{{{ dir }}}}
          {{% elif 'idle' in s %}}
            Idle · T: {{{{ states('sensor.{prefix}_temperature') }}}} °C
          {{% else %}}
            {{{{ states('sensor.{prefix}_process_status') }}}}
          {{% endif %}}
        icon: >
          {{% set s = states('sensor.{prefix}_process_status') | lower %}}
          {{% if 'run' in s %}}        mdi:play-circle
          {{% elif 'pause' in s %}}    mdi:pause-circle
          {{% elif 'idle' in s %}}     mdi:stop-circle-outline
          {{% elif 'alarm' in s %}}    mdi:alarm-light
          {{% else %}}                 mdi:state-machine
          {{% endif %}}
        icon_color: >
          {{% set s = states('sensor.{prefix}_process_status') | lower %}}
          {{% if 'run' in s %}}        green
          {{% elif 'pause' in s %}}    orange
          {{% elif 'idle' in s %}}     grey
          {{% elif 'alarm' in s %}}    red
          {{% else %}}                 blue
          {{% endif %}}
        layout: horizontal
        tap_action:
          action: more-info
          entity: "sensor.{prefix}_process_status"
        view_layout:
          grid-column: span 2

      - type: custom:mushroom-template-card
        primary: >
          {{{{ states('sensor.{prefix}_process_status') }}}}
        secondary: >
          {{{{ states('sensor.{prefix}_alarm_status') }}}}
          · {{{{ relative_time(states.sensor.{prefix}_process_status.last_changed) }}}}
        icon: mdi:history
        icon_color: grey
        layout: horizontal
        tap_action:
          action: more-info
          entity: "sensor.{prefix}_process_status"
        view_layout:
          grid-column: span 2

      - type: gauge
        entity: "sensor.{prefix}_temperature"
        name: Temperatura Processo
        unit: "°C"
        min: 0
        max: 200
        needle: true
        severity:
          green: 0
          yellow: 150
          red: 180
        view_layout:
          grid-column: span 1

      - type: gauge
        entity: "sensor.{prefix}_power_output"
        name: Potenza Uscita
        unit: "%"
        min: 0
        max: 100
        needle: true
        severity:
          green: 0
          yellow: 70
          red: 90
        view_layout:
          grid-column: span 1

      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: custom:mushroom-number-card
            entity: "number.{prefix}_main_setpoint"
            name: Setpoint Target (°C)
            icon: mdi:target
            icon_color: amber
            display_mode: slider
          - type: custom:mushroom-select-card
            entity: "select.{prefix}_target_mode"
            name: Modalità Operativa
            icon: mdi:swap-horizontal
            icon_color: blue
        view_layout:
          grid-column: span 1

      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: custom:mushroom-template-card
            primary: Start
            secondary: Avvia con sync config
            icon: mdi:play-circle
            icon_color: green
            layout: horizontal
            tap_action:
              action: call-service
              service: nanopid.bundled_start
          - type: custom:mushroom-template-card
            primary: Stop
            secondary: Ferma processo
            icon: mdi:stop-circle
            icon_color: red
            layout: horizontal
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: "button.{prefix}_stop"
          - type: custom:mushroom-template-card
            primary: Pausa
            secondary: Sospendi
            icon: mdi:pause-circle
            icon_color: orange
            layout: horizontal
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: "button.{prefix}_pause"
          - type: custom:mushroom-template-card
            primary: Riprendi
            secondary: Continua processo
            icon: mdi:play-pause
            icon_color: cyan
            layout: horizontal
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: "button.{prefix}_resume"
        view_layout:
          grid-column: span 1

      - type: custom:apexcharts-card
        header:
          show: true
          title: Andamento Processo — Ultime 2 Ore
          show_states: true
          colorize_states: true
        graph_span: 2h
        update_interval: 10s
        apex_config:
          chart:
            height: 200px
          stroke:
            dashArray: [0, 5, 0]
          fill:
            type: [solid, solid, gradient]
            gradient:
              shadeIntensity: 0.1
              opacityFrom: 0.3
              opacityTo: 0.05
        yaxis:
          - id: temp_axis
            min: 0
            max: 200
            decimals: 1
          - id: pwr_axis
            min: 0
            max: 100
            decimals: 0
            opposite: true
        series:
          - entity: "sensor.{prefix}_temperature"
            name: Temperatura (°C)
            yaxis_id: temp_axis
            color: "#1D9E75"
            stroke_width: 2
            type: line
          - entity: "number.{prefix}_main_setpoint"
            name: Setpoint (°C)
            yaxis_id: temp_axis
            color: "#378ADD"
            stroke_width: 1.5
            type: line
          - entity: "sensor.{prefix}_power_output"
            name: Potenza (%)
            yaxis_id: pwr_axis
            color: "#BA7517"
            stroke_width: 2
            type: area
        view_layout:
          grid-column: span 4

      - type: custom:stack-in-card
        mode: vertical
        title: Parametri di Controllo
        cards:
          - type: custom:stack-in-card
            mode: horizontal
            cards:
              - type: custom:mushroom-select-card
                entity: "select.{prefix}_control_mode"
                name: Modalità Controllo
                icon: mdi:tune-variant
                icon_color: indigo
              - type: custom:mushroom-select-card
                entity: "select.{prefix}_direction"
                name: Direzione
                icon: mdi:thermometer-lines
                icon_color: deep-orange
          - type: custom:stack-in-card
            mode: horizontal
            cards:
              - type: custom:mushroom-select-card
                entity: "select.{prefix}_start_behaviour"
                name: Avvio
                icon: mdi:play-speed
                icon_color: teal
              - type: custom:mushroom-select-card
                entity: "select.{prefix}_profile_type"
                name: Tipo Profilo
                icon: mdi:chart-timeline-variant
                icon_color: purple
        view_layout:
          grid-column: span 2

      - type: custom:stack-in-card
        mode: vertical
        title: Soglie Allarme
        cards:
          - type: custom:mushroom-number-card
            entity: "number.{prefix}_alarm_th_low"
            name: Soglia Bassa (°C)
            icon: mdi:thermometer-low
            icon_color: blue
            display_mode: buttons
          - type: custom:mushroom-number-card
            entity: "number.{prefix}_alarm_th_high"
            name: Soglia Alta (°C)
            icon: mdi:thermometer-high
            icon_color: red
            display_mode: buttons
        view_layout:
          grid-column: span 1

      - type: custom:mushroom-entity-card
        entity: "sensor.{prefix}_free_heap"
        name: Heap Libero
        icon: mdi:memory
        icon_color: grey
        secondary_info: last-changed
        tap_action:
          action: more-info
        view_layout:
          grid-column: span 1
